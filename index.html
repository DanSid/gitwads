<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GITW 2026 — A/B Ad Layouts</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f4f0;
        color: #1a1a1a;
        padding: 24px;
        min-height: 100vh;
      }
      .header {
        max-width: 1100px;
        margin: 0 auto 24px;
        padding: 0 8px;
      }
      .header h1 {
        font-size: 22px;
        font-weight: 600;
        color: #1a2a3c;
        margin-bottom: 2px;
      }
      .header p {
        font-size: 13px;
        color: #666;
        margin-bottom: 20px;
      }
      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 14px;
      }
      .tab {
        padding: 7px 16px;
        border-radius: 20px;
        border: 1px solid #ccc;
        background: #fff;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        font-family: inherit;
        color: #555;
      }
      .tab.active {
        background: #1a2a3c;
        color: #f5c842;
        border-color: #2d3e52;
      }
      .tab:hover:not(.active) {
        background: #eee;
      }
      .platforms {
        display: flex;
        gap: 6px;
        margin-bottom: 0;
      }
      .plat {
        padding: 6px 16px;
        border-radius: 6px;
        border: 1px solid #ccc;
        background: #fff;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        font-family: inherit;
        color: #555;
      }
      .plat.active {
        background: #fef7e0;
        color: #9a6e00;
        border-color: #e6c84a;
      }
      .plat:hover:not(.active) {
        background: #eee;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 8px;
      }
      @media (max-width: 740px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
      .col-label {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #888;
        margin-bottom: 8px;
      }
      .creative-card {
        background: #fff;
        border-radius: 10px;
        border: 1px solid #ddd;
        overflow: hidden;
      }
      .placeholder {
        background: linear-gradient(
          135deg,
          #d4dbed 0%,
          #e8edf5 40%,
          #f0f3f7 100%
        );
        padding: 24px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        border-top: 1.5px dashed #8ca3bf;
        border-bottom: 1.5px dashed #8ca3bf;
      }
      .placeholder svg {
        opacity: 0.7;
      }
      .placeholder .img-desc {
        font-size: 11px;
        color: #4a607a;
        text-align: center;
        line-height: 1.5;
        max-width: 90%;
        font-style: italic;
      }
      .placeholder .img-spec {
        font-size: 10px;
        color: #2d507a;
        text-align: center;
        font-weight: 600;
        letter-spacing: 0.5px;
        background: rgba(26, 42, 60, 0.08);
        padding: 4px 12px;
        border-radius: 10px;
        margin-top: 2px;
      }
      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: #1a2a3c;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .avatar span {
        color: #f5c842;
        font-size: 10px;
        font-weight: 600;
      }
      .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        border-radius: 50%;
      }
      .avatar.sm {
        width: 28px;
        height: 28px;
      }
      .avatar.sm span {
        font-size: 9px;
      }
      .btn-fb {
        background: #1877f2;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 7px 16px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        font-family: inherit;
      }
      .btn-ig {
        background: #0095f6;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 6px 18px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        font-family: inherit;
      }
      .btn-rd {
        background: #ff4500;
        color: #fff;
        border: none;
        border-radius: 20px;
        padding: 6px 18px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        font-family: inherit;
      }
      .btn-li {
        background: #0a66c2;
        color: #fff;
        border: none;
        border-radius: 20px;
        padding: 7px 18px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
        font-family: inherit;
      }
      .btn-tk {
        background: #000;
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 7px 18px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
        font-family: inherit;
      }
      .hidden {
        display: none;
      }
      .page-label {
        font-size: 11px;
        color: #999;
        text-align: center;
        margin-top: 32px;
        padding-bottom: 8px;
      }
      .spec-bar {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 6px;
        padding: 7px 12px;
        background: #f0f2f4;
        font-size: 10px;
        color: #4a607a;
        letter-spacing: 0.2px;
      }
      .spec-bar span.dot {
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: #8ca3bf;
        display: inline-block;
      }
      .single-col .grid {
        grid-template-columns: 1fr;
        max-width: 560px;
      }
      .note-bar {
        max-width: 1100px;
        margin: 0 auto 16px;
        padding: 8px 16px;
        background: #fff8e1;
        border: 1px solid #f0e4b0;
        border-radius: 8px;
        font-size: 12px;
        color: #7a6400;
        line-height: 1.5;
      }
      .note-bar strong {
        font-weight: 600;
      }
      .script-block {
        background: #fff;
        border-radius: 10px;
        border: 1px solid #ddd;
        overflow: hidden;
      }
      .script-header {
        padding: 12px 16px;
        border-bottom: 1px solid #eee;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .script-header .badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 12px;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .script-header .badge.reel {
        background: #f0e6ff;
        color: #7c3aed;
      }
      .script-header .badge.tiktok {
        background: #000;
        color: #fff;
      }
      .script-header .badge.inmail {
        background: #dbeafe;
        color: #1e40af;
      }
      .script-body {
        padding: 14px 16px;
      }
      .script-body .line {
        display: flex;
        gap: 10px;
        margin-bottom: 8px;
        font-size: 13px;
        line-height: 1.5;
      }
      .script-body .timestamp {
        font-weight: 600;
        color: #1a2a3c;
        white-space: nowrap;
        min-width: 48px;
        font-size: 12px;
        font-family: "SF Mono", Monaco, Consolas, monospace;
      }
      .script-body .direction {
        color: #444;
      }
      .script-body .audio-note {
        margin-top: 10px;
        padding: 8px 12px;
        background: #f7f8fa;
        border-radius: 6px;
        font-size: 12px;
        color: #666;
        font-style: italic;
      }
      .script-body .vibe-note {
        margin-top: 6px;
        padding: 8px 12px;
        background: #fef7e0;
        border-radius: 6px;
        font-size: 12px;
        color: #7a6400;
      }
      .visual-dir {
        padding: 14px 16px;
        border-top: 1px solid #eee;
        background: #fafafa;
      }
      .visual-dir h4 {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #888;
        margin-bottom: 8px;
      }
      .visual-dir .slide {
        font-size: 12px;
        color: #444;
        line-height: 1.5;
        margin-bottom: 4px;
        padding-left: 8px;
        border-left: 2px solid #ddd;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>GITW 2026 — A/B Ad Layouts</h1>
      <p>
        3 A/B tests · 2 variants each · Facebook, Instagram, X, LinkedIn ·
        Exhibitor audiences
      </p>
      <div class="tabs" id="testTabs"></div>
      <div class="platforms" id="platTabs"></div>
    </div>

    <div id="noteArea"></div>
    <div class="grid" id="cardGrid"></div>
    <p class="page-label">MIE Events DMCC</p>

    <script>
      const tests = [
        {
          id: 1,
          platform: "Facebook",
          audience: "Exhibitor",
          theme: "Relationship Access vs Incentives",
          adA: {
            primary:
              "The deals that shape West Africa don’t start with an email. They start with a handshake.\n\nGhana Investment & Trade Week returns July 7–9 at The Palms Convention Center, Accra — and this year, three powerhouse exhibitions converge under one roof.\n\nThis is where you sit across from the minister implementing the 24-Hour Economy. Where you shake hands with the CEO before the tender drops. Where 200+ pre-matched B2B meetings put you face-to-face with the decision-maker you’ve been chasing for six months.\n\nCEO Top Table sessions. Government delegations. Closed-door conversations. No cameras. Just the people who move markets.",
            headline: "The Room Where It Happens — GITW 2026",
            description:
              "7–9 July 2026 | Accra, Ghana | 1,500+ Delegates | 150+ Speakers",
            cta: "Register Now",
            image:
              "Hero shot of executive handshake at an African business summit. Convention centre atrium with warm lighting, VIP lanyards, and national flags. Professional, high-energy, aspirational tone.",
            imgFile: "GEO-AD1.png",
          },
          adB: {
            primary:
              "Ghana’s 24-Hour Economy programme is offering incentives that change the math on every deal:\n\n→ 50% corporate income tax rebate for 24-hour operations\n→ Full import duty + VAT waiver on machinery & equipment\n→ Up to 30% infrastructure tax credit\n→ Concessional loans at 12% interest\n\nBut here’s the thing — the people who capture these incentives are the ones who understand the details. Who know the right officials. Who were in the room when the policy was explained by the people implementing it.\n\nGITW 2026 is that room. July 7–9, Accra.",
            headline:
              "50% Tax Rebates. Full Duty Waivers. Are You In The Room?",
            description:
              "Ghana Investment & Trade Week | The Palms Convention Center",
            cta: "Register Free",
            image:
              "Bold typography-forward creative with key incentive numbers (50%, 30%) as oversized text. Ghana flag colour accents. Clean data-visualization feel. Convention centre imagery faded in background.",
            imgFile: "GEO-AD2.png",
          },
        },
       
        
      ];

      const platforms = [
        "Facebook",
        "Instagram",
        "X",
        "LinkedIn",
      ];
      let curTest = 0,
        curPlat = "Facebook";

      const imgSvg =
        '<svg width="36" height="36" viewBox="0 0 36 36" fill="none"><rect x="2" y="6" width="32" height="24" rx="3" stroke="#6b809e" stroke-width="1.5" fill="none"/><circle cx="12" cy="15" r="3" stroke="#6b809e" stroke-width="1.2" fill="none"/><path d="M4 26l8-8 5 5 4-3 11 6" stroke="#6b809e" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      const vidSvg =
        '<svg width="36" height="36" viewBox="0 0 36 36" fill="none"><rect x="2" y="6" width="32" height="24" rx="3" stroke="#6b809e" stroke-width="1.5" fill="none"/><polygon points="15,12 25,18 15,24" stroke="#6b809e" stroke-width="1.2" fill="none" stroke-linejoin="round"/></svg>';

      const platSpecs = {
        Facebook: {
          label: "Facebook Feed Ad",
          ratio: "4:5",
          px: "1080 \u00d7 1350 px",
          format: "JPG / PNG",
          maxSize: "30 MB max",
          aspect: "4/5",
        },
        Instagram: {
          label: "Instagram Feed Ad",
          ratio: "4:5",
          px: "1080 \u00d7 1350 px",
          format: "JPG / PNG",
          maxSize: "30 MB max",
          aspect: "4/5",
        },
        X: {
          label: "X Image Ad",
          ratio: "16:9",
          px: "1200 × 675 px",
          format: "JPG / PNG",
          maxSize: "5 MB max",
          aspect: "16/9",
        },
        LinkedIn: {
          label: "LinkedIn Sponsored Content",
          ratio: "1.91:1",
          px: "1200 \u00d7 627 px",
          format: "JPG / PNG",
          maxSize: "5 MB max",
          aspect: "1.91/1",
        },
      };

      function nl2br(s) {
        return s.replace(/\n/g, "<br>");
      }

      function brandAvatar(sm) {
        return (
          '<div class="avatar' +
          (sm ? " sm" : "") +
          '"><img src="logo.png" alt="Ghana Investment & Trade Week icon"></div>'
        );
      }

      function ctaButton(btnClass, label, link) {
        if (link) {
          return (
            '<a href="' +
            link +
            '" class="' +
            btnClass +
            '" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center">' +
            label +
            "</a>"
          );
        }
        return '<button class="' + btnClass + '">' + label + "</button>";
      }

      function safeAssetPath(imgFile) {
        if (imgFile === "GEO-AD1.png") return "creative-a.png";
        if (imgFile === "GEO-AD2.png") return "creative-b.png";
        return imgFile;
      }

      function placeholder(desc, plat, isVideo, imgFile) {
        const s = platSpecs[plat];
        let specText =
          s.ratio +
          " ratio \u00b7 " +
          s.px +
          " \u00b7 " +
          s.format +
          " \u00b7 " +
          s.maxSize;
        if (s.extra) specText += "\n" + s.extra;
        if (imgFile) {
          return (
            '<div style="position:relative;background:#f7f4ed;display:flex;align-items:center;justify-content:center;padding:10px"><img src="' +
            safeAssetPath(imgFile) +
            '" alt="' +
            desc.replace(/"/g, "&quot;").substring(0, 80) +
            '" style="width:100%;height:auto;object-fit:contain;display:block"></div>'
          );
        }
        return (
          '<div class="placeholder" style="aspect-ratio:' +
          s.aspect +
          ';max-height:400px">' +
          (isVideo ? vidSvg : imgSvg) +
          '<p class="img-desc">' +
          desc +
          "</p>" +
          '<span class="img-spec">' +
          specText +
          "</span>" +
          "</div>"
        );
      }

      function specBar(plat) {
        const s = platSpecs[plat];
        let parts = [
          s.label,
          "Ratio: " + s.ratio,
          "Size: " + s.px,
          s.format,
          s.maxSize,
        ];
        if (s.extra) parts.push(s.extra);
        return (
          '<div class="spec-bar">' +
          parts.join(' <span class="dot"></span> ') +
          "</div>"
        );
      }

      function facebookAd(ad) {
        return (
          '<div class="creative-card">' +
          '<div style="padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #eee">' +
          brandAvatar(false) +
          '<div><p style="font-size:13px;font-weight:600;color:#1c1e21">Ghana Investment & Trade Week</p><p style="font-size:11px;color:#65676b">MIE sponsored \u00b7 \ud83c\udf10</p></div>' +
          "</div>" +
          '<div style="padding:8px 14px 12px"><p style="font-size:13.5px;line-height:1.55;color:#1c1e21">' +
          nl2br(ad.primary) +
          "</p></div>" +
          placeholder(ad.image, "Facebook", false, ad.imgFile) +
          specBar("Facebook") +
          '<div style="padding:10px 14px;border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;background:#f7f8fa">' +
          '<div style="flex:1;min-width:0"><p style="font-size:11px;color:#65676b;text-transform:uppercase;letter-spacing:.3px">gitw.com.gh</p><p style="margin-top:2px;font-size:14px;font-weight:600;color:#1c1e21">' +
          ad.headline +
          '</p><p style="margin-top:1px;font-size:12px;color:#65676b">' +
          ad.description +
          "</p></div>" +
          ctaButton("btn-fb", ad.cta, ad.ctaLink) +
          "</div></div>"
        );
      }

      function instagramAd(ad) {
        return (
          '<div class="creative-card">' +
          '<div style="padding:10px 14px;display:flex;align-items:center;justify-content:space-between">' +
          '<div style="display:flex;align-items:center;gap:10px">' +
          brandAvatar(true) +
          '<div><p style="font-size:13px;font-weight:600;color:#262626">gitwghana</p><p style="font-size:10px;color:#8e8e8e">Sponsored</p></div>' +
          "</div>" +
          '<span style="color:#262626;font-size:16px;letter-spacing:2px">\u00b7\u00b7\u00b7</span>' +
          "</div>" +
          placeholder(
            ad.image,
            "Instagram",
            !!ad.format && ad.format.includes("Carousel"),
            ad.imgFile,
          ) +
          specBar("Instagram") +
          '<div style="padding:10px 14px 4px;display:flex;gap:14px">' +
          '<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" stroke="#262626" stroke-width="1.5" fill="none"/></svg>' +
          '<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2v10z" stroke="#262626" stroke-width="1.5" fill="none"/></svg>' +
          '<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="#262626" stroke-width="1.5" fill="none"/></svg>' +
          '<div style="flex:1"></div>' +
          '<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M19 21l-7-4-7 4V5a2 2 0 012-2h10a2 2 0 012 2v16z" stroke="#262626" stroke-width="1.5" fill="none"/></svg>' +
          "</div>" +
          '<div style="padding:6px 14px 8px"><p style="font-size:13px;color:#262626;line-height:1.5"><strong>gitwghana</strong> ' +
          nl2br(ad.primary) +
          "</p></div>" +
          '<div style="padding:6px 14px 10px;border-top:1px solid #efefef;display:flex;align-items:center;justify-content:space-between">' +
          '<div style="min-width:0"><p style="font-size:13px;font-weight:600;color:#262626">' +
          ad.headline +
          '</p><p style="margin-top:2px;font-size:11px;color:#8e8e8e">' +
          ad.description +
          "</p></div>" +
          ctaButton("btn-ig", ad.cta, ad.ctaLink) +
          "</div></div>"
        );
      }
      function xAd(ad) {
        return (
          '<div class="creative-card">' +
          '<div style="padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #ebeef0">' +
          '<div style="display:flex;align-items:center;gap:10px">' +
          brandAvatar(true) +
          '<div><p style="font-size:13px;font-weight:700;color:#0f1419">@gitwghana</p><p style="font-size:11px;color:#536471">Promoted</p></div>' +
          "</div>" +
          '<span style="font-size:18px;color:#536471">···</span>' +
          "</div>" +
          '<div style="padding:10px 14px 12px"><p style="font-size:14px;line-height:1.55;color:#0f1419">' +
          nl2br(ad.primary) +
          "</p></div>" +
          placeholder(ad.image, "X", false, ad.imgFile) +
          specBar("X") +
          '<div style="padding:10px 14px;border-top:1px solid #ebeef0;display:flex;align-items:center;justify-content:space-between;background:#f7f9f9">' +
          '<div style="flex:1;min-width:0"><p style="font-size:14px;font-weight:700;color:#0f1419">' +
          ad.headline +
          '</p><p style="margin-top:2px;font-size:12px;color:#536471">' +
          ad.description +
          "</p></div>" +
          ctaButton("btn-li", ad.cta, ad.ctaLink) +
          "</div></div>"
        );
      }

      function redditAd(ad) {
        return (
          '<div class="creative-card">' +
          '<div style="padding:10px 14px 6px;display:flex;align-items:center;gap:8px">' +
          brandAvatar(true) +
          '<span style="font-size:12px;font-weight:600;color:#1a1a1b">u/GITWGhana</span>' +
          '<span style="font-size:11px;color:#7c7c7c">\u00b7 Promoted</span>' +
          "</div>" +
          '<div style="padding:0 14px 8px"><p style="font-size:15px;font-weight:600;color:#1a1a1b;line-height:1.35">' +
          ad.headline +
          "</p></div>" +
          placeholder(ad.image, "Reddit", false, ad.imgFile) +
          specBar("Reddit") +
          '<div style="padding:10px 14px"><p style="font-size:13px;color:#1a1a1b;line-height:1.5">' +
          nl2br(ad.primary) +
          "</p></div>" +
          '<div style="padding:6px 14px 10px;border-top:1px solid #edeff1;display:flex;align-items:center;justify-content:space-between">' +
          '<p style="font-size:11px;color:#7c7c7c">' +
          ad.description +
          "</p>" +
          ctaButton("btn-rd", ad.cta, ad.ctaLink) +
          "</div></div>"
        );
      }

      function linkedinAd(ad) {
        return (
          '<div class="creative-card">' +
          '<div style="padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #eee">' +
          brandAvatar(false) +
          '<div><p style="font-size:13px;font-weight:600;color:#000">Ghana Investment & Trade Week</p><p style="font-size:11px;color:#666">1,200 followers \u00b7 Promoted</p></div>' +
          "</div>" +
          '<div style="padding:8px 14px 12px"><p style="font-size:13.5px;line-height:1.55;color:#000">' +
          nl2br(ad.primary) +
          "</p></div>" +
          placeholder(ad.image, "LinkedIn", false, ad.imgFile) +
          specBar("LinkedIn") +
          '<div style="padding:10px 14px;border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;background:#f9fafb">' +
          '<div style="flex:1;min-width:0"><p style="font-size:14px;font-weight:600;color:#000">' +
          ad.headline +
          '</p><p style="margin-top:2px;font-size:12px;color:#666">' +
          ad.description +
          "</p></div>" +
          ctaButton("btn-li", ad.cta, ad.ctaLink) +
          "</div></div>"
        );
      }

      function scriptCard(data, label, badgeClass) {
        let html = '<div class="script-block">';
        html +=
          '<div class="script-header"><span class="badge ' +
          badgeClass +
          '">' +
          label +
          "</span>";
        if (data.format)
          html +=
            '<span style="font-size:11px;color:#888;margin-left:auto">' +
            data.format +
            "</span>";
        html += '</div><div class="script-body">';
        data.script.forEach(function (s) {
          html +=
            '<div class="line"><span class="timestamp">[' +
            s.time +
            ']</span><span class="direction">' +
            s.dir +
            "</span></div>";
        });
        if (data.audio)
          html +=
            '<div class="audio-note">\ud83c\udfb5 Audio: ' +
            data.audio +
            "</div>";
        if (data.vibe)
          html +=
            '<div class="vibe-note">\ud83c\udfaf Vibe: ' + data.vibe + "</div>";
        html += "</div></div>";
        return html;
      }

      function inmailCard(data) {
        let html = '<div class="script-block">';
        html +=
          '<div class="script-header"><span class="badge inmail">InMail</span>';
        if (data.format)
          html +=
            '<span style="font-size:11px;color:#888;margin-left:auto">' +
            data.format +
            "</span>";
        html += "</div>";
        html +=
          '<div style="padding:10px 16px;background:#f0f4f8;border-bottom:1px solid #e2e8f0"><p style="font-size:11px;color:#666;margin-bottom:2px">Subject</p><p style="font-size:14px;font-weight:600;color:#000">' +
          data.subject +
          "</p></div>";
        html +=
          '<div class="script-body"><p style="font-size:13px;color:#333;line-height:1.6;white-space:pre-line">' +
          data.body +
          "</p></div>";
        html += "</div>";
        return html;
      }

      function getTestsForPlatform(plat) {
        const baseTests = tests.filter(function (t) {
          return t.platform === "Facebook";
        });
        if (plat === "Facebook") {
          return baseTests.map(function (t) {
            return {
              id: t.id,
              platform: t.platform,
              audience: t.audience,
              theme: t.theme,
              adA: {
                primary: t.adA.primary,
                headline: t.adA.headline,
                description: t.adA.description,
                cta: t.adA.cta,
                ctaLink:
                  t.adA.cta === "Register Now"
                    ? "gitw_exhibitor_landing.html"
                    : "",
                image: t.adA.image,
                imgFile: t.adA.imgFile,
              },
              adB: {
                primary: t.adB.primary,
                headline: t.adB.headline,
                description: t.adB.description,
                cta: t.adB.cta,
                ctaLink:
                  t.adB.cta === "Register Free"
                    ? "GEO-GITC-Landing Page-B/landingpage-B.html"
                    : "",
                image: t.adB.image,
                imgFile: t.adB.imgFile,
              },
            };
          });
        }
        return baseTests.map(function (t) {
          return {
            id: t.id + "-" + plat.toLowerCase(),
            platform: plat,
            audience: t.audience,
            theme: t.theme,
            adA: {
              primary: t.adA.primary,
              headline: t.adA.headline,
              description: t.adA.description,
              cta: t.adA.cta,
              ctaLink:
                t.adA.cta === "Register Now"
                    ? "gitw_exhibitor_landing.html"
                    : "",
              image: t.adA.image,
              imgFile: t.adA.imgFile,
            },
            adB: {
              primary: t.adB.primary,
              headline: t.adB.headline,
              description: t.adB.description,
              cta: t.adB.cta,
                ctaLink:
                  t.adB.cta === "Register Free"
                    ? "GEO-GITC-Landing Page-B/landingpage-B.html"
                    : "",
                image: t.adB.image,
                imgFile: t.adB.imgFile,
            },
          };
        });
      }

      function render() {
        var platTests = getTestsForPlatform(curPlat);
        if (curTest >= platTests.length) curTest = 0;
        var test = platTests[curTest];

        // render tabs
        var tabsEl = document.getElementById("testTabs");
        tabsEl.innerHTML = "";
        platTests.forEach(function (t, i) {
          var b = document.createElement("button");
          b.className = "tab" + (i === curTest ? " active" : "");
          var label = t.audience + ": " + t.theme;
          b.textContent = label;
          b.onclick = function () {
            curTest = i;
            render();
          };
          tabsEl.appendChild(b);
        });

        // render platform tabs
        document.querySelectorAll(".plat").forEach(function (p) {
          p.classList.toggle("active", p.textContent === curPlat);
        });

        var noteArea = document.getElementById("noteArea");
        noteArea.innerHTML = "";
        var gridEl = document.getElementById("cardGrid");
        var renderAd;
        if (curPlat === "Facebook") renderAd = facebookAd;
        else if (curPlat === "Instagram") renderAd = instagramAd;
        else if (curPlat === "X") renderAd = xAd;
        else if (curPlat === "LinkedIn") renderAd = linkedinAd;
        else renderAd = facebookAd;

        gridEl.innerHTML =
          '<div><p class="col-label">Ad A</p>' +
          renderAd(test.adA) +
          "</div>" +
          '<div><p class="col-label">Ad B</p>' +
          renderAd(test.adB) +
          "</div>";
      }

      // Build platform tabs
      var platEl = document.getElementById("platTabs");
      platforms.forEach(function (p) {
        var b = document.createElement("button");
        b.className = "plat";
        b.textContent = p;
        b.onclick = function () {
          curPlat = p;
          curTest = 0;
          render();
        };
        platEl.appendChild(b);
      });

      render();
    </script>
  </body>
</html>
